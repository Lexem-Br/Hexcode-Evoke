<div class="page-overlay">
    <div class="decorated-container" data-hyui-title="Evoke Book" style="anchor-height: 500; anchor-width: 800">
        <div class="container-contents" style="layout-mode: Top; padding: 6;">
            <p id="summary" style="padding: 8;">1/6</p>

            {{#each hexcreature}}
                <div class="bounty-card" style="layout-mode: Left; padding: 6;">
                    <div id="salvage-grid"
                         class="item-grid"
                         data-hyui-slots-per-row="1"
                         data-hyui-inventory-section-id="10"
                         data-hyui-are-items-draggable="false">
                        <div class="item-grid-slot"
                             data-hyui-item-id={{$blockName}}
                             data-hyui-quantity="1">
                        </div>
                    </div>
                    <div style="layout-mode: Middle;">
                        <p style="padding: 6;">ID: {{$name}}</p>
                    </div>
                </div>
            {{/each}}
        </div>
    </div>
</div>
